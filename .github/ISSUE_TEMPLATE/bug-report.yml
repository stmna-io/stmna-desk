name: Bug Report
about: Something isn't working as documented
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill in what you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue. What did you expect vs what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Deploy llama-swap with compose file
        2. Load Qwen3.5-35B
        3. Send a request
        4. See error in container logs
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages or logs. This will be formatted as code automatically.
      render: shell

  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: CPU model and RAM
      placeholder: "AMD Ryzen AI Max+ 395, 128GB"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and kernel
      description: Output of `lsb_release -ds` and `uname -r`
      placeholder: "Ubuntu 24.04.3 LTS, 6.17.0-14-generic"
    validations:
      required: true

  - type: input
    id: podman
    attributes:
      label: Podman version
      description: Output of `podman --version`
      placeholder: "podman version 4.9.3"

  - type: input
    id: service
    attributes:
      label: Which service/compose file?
      description: Which stack is affected?
      placeholder: "stacks/llama-swap"