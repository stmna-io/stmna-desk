<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8ECF0"/>
    </linearGradient>
    <linearGradient id="inferenceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C42" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF8C42" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="appsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4361EE" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#4361EE" stop-opacity="0.11"/>
    </linearGradient>
    <linearGradient id="autoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D3A5C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2D3A5C" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="softShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
    <filter id="zoneShadow" x="-1%" y="-1%" width="102%" height="102%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1A1A2E" flood-opacity="0.05"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8892A0" stroke-width="1.2"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8892A0" stroke-width="1.2"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&amp;family=Space+Grotesk:wght@400;500&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    .zone-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    .service-name { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 13px; }
    .service-desc { font-family: 'Space Grotesk', sans-serif; font-weight: 400; font-size: 10.5px; fill: #6B7280; }
    .desk-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; fill: #1A1A2E; }
    .desk-subtitle { font-family: 'Space Grotesk', sans-serif; font-weight: 400; font-size: 11px; fill: #6B7280; }
    .conn-label { font-family: 'Space Grotesk', sans-serif; font-weight: 400; font-size: 10px; fill: #6B7280; }
    .external-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; fill: #6B7280; }
  </style>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1200" height="820" rx="0" fill="url(#bgGrad)"/>

  <!-- ==================== ZONE: CLIENT DEVICES ==================== -->
  <rect x="400" y="20" width="400" height="62" rx="14" fill="#8892A0" fill-opacity="0.07" stroke="#8892A0" stroke-opacity="0.15" stroke-width="1"/>
  <text x="600" y="38" class="external-label" fill="#6B7280" text-anchor="middle">CLIENT DEVICES</text>
  <rect x="460" y="46" width="130" height="28" rx="8" fill="#FFFFFF" stroke="#C9CED6" stroke-width="1" filter="url(#softShadow)"/>
  <text x="525" y="65" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F4BB;  Laptop</text>
  <rect x="610" y="46" width="130" height="28" rx="8" fill="#FFFFFF" stroke="#C9CED6" stroke-width="1" filter="url(#softShadow)"/>
  <text x="675" y="65" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F4F1;  Mobile</text>

  <!-- Arrow: Clients → VPS (HTTPS — bold dashed, extended +8px, badge centered at gap midpoint y=111) -->
  <line x1="600" y1="82" x2="600" y2="140" stroke="#8892A0" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
  <rect x="540" y="98" width="120" height="20" rx="6" fill="#E8ECF0" stroke="#8892A0" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="600" y="112" class="conn-label" text-anchor="middle">&#x1F512; HTTPS</text>

  <!-- ==================== ZONE: VPS (gateway) ==================== -->
  <rect x="300" y="140" width="600" height="82" rx="14" fill="#8892A0" fill-opacity="0.07" stroke="#8892A0" stroke-opacity="0.15" stroke-width="1"/>
  <text x="316" y="158" class="external-label" fill="#6B7280">VPS  &#x2014;  GATEWAY</text>
  <rect x="370" y="164" width="220" height="48" rx="8" fill="#FFFFFF" stroke="#C9CED6" stroke-width="1" filter="url(#softShadow)"/>
  <text x="480" y="184" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F6E1;  Caddy</text>
  <text x="480" y="200" class="service-desc" text-anchor="middle">HTTPS + Bearer Auth</text>
  <rect x="610" y="164" width="220" height="48" rx="8" fill="#FFFFFF" stroke="#C9CED6" stroke-width="1" filter="url(#softShadow)"/>
  <text x="720" y="184" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F4E1;  Signal API</text>
  <text x="720" y="200" class="service-desc" text-anchor="middle">signal-cli-rest-api</text>

  <!-- Arrow: VPS → Desk (Tailscale tunnel — lighter dashed, extended +4px top) -->
  <line x1="600" y1="222" x2="600" y2="278" stroke="#8892A0" stroke-width="1.2" stroke-dasharray="5,3" stroke-opacity="0.5" marker-end="url(#arrowDash)"/>
  <rect x="520" y="238" width="160" height="20" rx="6" fill="#E8ECF0" stroke="#8892A0" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="600" y="252" class="conn-label" text-anchor="middle">&#x1F510; Tailscale VPN Tunnel</text>

  <!-- ==================== DESK BOUNDARY ==================== -->
  <!-- Desk boundary: top=278, bottom=766 -->
  <rect x="40" y="278" width="1120" height="488" rx="18" fill="none" stroke="#2D3A5C" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Desk title: STMNA_Desk at 18px (matching brand wordmark) -->
  <text x="80" y="304" class="desk-title">STMNA</text>
  <text x="132" y="304" style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:18px; fill:#FF8C42">_</text>
  <text x="141" y="304" class="desk-title" style="fill:#5390D9">Desk</text>
  <text x="198" y="304" class="desk-subtitle">Framework Desktop  &#xB7;  128 GB  &#xB7;  AMD Strix Halo</text>

  <!-- ==================== ZONE 1: INFERENCE ==================== -->
  <!-- y=320, h=100, bottom=420 (shrunk from h=140 — consistent padding below boxes) -->
  <rect x="70" y="320" width="1060" height="100" rx="14" fill="url(#inferenceGrad)" stroke="#FF8C42" stroke-opacity="0.2" stroke-width="1" filter="url(#zoneShadow)"/>
  <text x="90" y="340" class="zone-label" fill="#CC6F35">INFERENCE</text>

  <rect x="200" y="354" width="220" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="310" y="376" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F399;  Whisper</text>
  <text x="310" y="392" class="service-desc" text-anchor="middle">Speech-to-text (2 instances)</text>

  <rect x="460" y="350" width="280" height="56" rx="10" fill="#FFFFFF" stroke="#FF8C42" stroke-width="2" filter="url(#softShadow)"/>
  <text x="600" y="375" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F9E0;  llama-swap</text>
  <text x="600" y="393" class="service-desc" text-anchor="middle">OpenAI-compatible API &#x2014; hot-swaps models</text>

  <rect x="780" y="354" width="220" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="890" y="376" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F50A;  Kokoro TTS</text>
  <text x="890" y="392" class="service-desc" text-anchor="middle">Text-to-speech synthesis</text>

  <!-- ==================== ZONE 2: APPLICATIONS ==================== -->
  <!-- y=458, h=140, bottom=598 (gap from inference: 38px) -->
  <rect x="70" y="458" width="480" height="140" rx="14" fill="url(#appsGrad)" stroke="#4361EE" stroke-opacity="0.15" stroke-width="1" filter="url(#zoneShadow)"/>
  <text x="90" y="478" class="zone-label" fill="#3651CC">APPLICATIONS</text>

  <rect x="200" y="490" width="220" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="310" y="512" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F310;  Open WebUI</text>
  <text x="310" y="528" class="service-desc" text-anchor="middle">Chat + RAG + Web Search</text>

  <rect x="200" y="546" width="220" height="42" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="310" y="564" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F916;  Agent Zero</text>
  <text x="310" y="580" class="service-desc" text-anchor="middle">Autonomous AI Agent</text>

  <!-- ==================== ZONE 3: AUTOMATION ==================== -->
  <!-- y=458, h=140, bottom=598 (same row as Applications) -->
  <rect x="590" y="458" width="540" height="140" rx="14" fill="url(#autoGrad)" stroke="#FFD700" stroke-opacity="0.2" stroke-width="1" filter="url(#zoneShadow)"/>
  <text x="610" y="478" class="zone-label" fill="#B89B00">AUTOMATION</text>

  <rect x="730" y="486" width="260" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="860" y="508" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x26A1;  n8n</text>
  <text x="860" y="524" class="service-desc" text-anchor="middle">Workflow automation engine</text>

  <rect x="690" y="543" width="150" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="765" y="561" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F50D;  SearXNG</text>
  <text x="765" y="577" class="service-desc" text-anchor="middle">Private meta-search engine</text>

  <rect x="880" y="543" width="150" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="955" y="561" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F578;  Crawl4AI</text>
  <text x="955" y="577" class="service-desc" text-anchor="middle">AI-powered web scraper</text>

  <!-- ==================== ZONE 4: DATA & INFRASTRUCTURE ==================== -->
  <!-- y=636, h=100, bottom=736 (gap from Apps/Auto: 38px) -->
  <rect x="70" y="636" width="1060" height="100" rx="14" fill="url(#dataGrad)" stroke="#2D3A5C" stroke-opacity="0.12" stroke-width="1" filter="url(#zoneShadow)"/>
  <text x="90" y="656" class="zone-label" fill="#4A5568">DATA &amp; INFRASTRUCTURE</text>

  <rect x="160" y="668" width="190" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="255" y="688" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F433;  Dockge</text>
  <text x="255" y="704" class="service-desc" text-anchor="middle">Container Management</text>

  <rect x="380" y="668" width="220" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="490" y="688" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F5C4;  PostgreSQL</text>
  <text x="490" y="704" class="service-desc" text-anchor="middle">Queue, cache, training pairs</text>

  <rect x="630" y="668" width="190" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="725" y="688" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x1F500;  Forgejo</text>
  <text x="725" y="704" class="service-desc" text-anchor="middle">Private Git Forge</text>

  <rect x="850" y="668" width="190" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#softShadow)"/>
  <text x="945" y="688" class="service-name" fill="#1A1A2E" text-anchor="middle">&#x2601;  NextCloud</text>
  <text x="945" y="704" class="service-desc" text-anchor="middle">File Storage + Ingestion</text>

  <!-- ==================== CONNECTION ARROWS (inside Desk) ==================== -->
  <!-- Gap zone between Inference(420) and Apps/Auto(458): y=420-458, 38px -->
  <!-- Arrow y-layers (8px spacing): A0+n8n→llama=430, n8n→Whisper=438, OWU=446 -->

  <!-- A0 → llama-swap: exits A0 left at y=567, right to x=186 (between APPLICATIONS label and OWU), up to y=430, right to llama x=560 -->
  <path d="M200,567 L191,567 Q186,567 186,562 L186,435 Q186,430 191,430 L555,430 Q560,430 560,425 L560,406" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- n8n → llama-swap: exits x=800 (swapped — left side), horizontal at y=430, enters llama at x=640 -->
  <path d="M800,486 L800,435 Q800,430 795,430 L645,430 Q640,430 640,425 L640,406" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- n8n → Whisper: exits x=860, up into inference zone, left at y=411 (midpoint Kokoro bottom 402 ↔ zone bottom 420), through llama-Kokoro gap x=760, up, left at y=335 (midpoint zone top 320 ↔ llama top 350), down into Whisper top -->
  <path d="M860,486 L860,416 Q860,411 855,411 L765,411 Q760,411 760,406 L760,340 Q760,335 755,335 L315,335 Q310,335 310,340 L310,354" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- OWU → llama-swap: exits OWU top (x=310), horizontal at y=446 (8px below n8n→Whisper), enters llama at x=600 -->
  <path d="M310,490 L310,451 Q310,446 315,446 L595,446 Q600,446 600,441 L600,406" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- n8n → Kokoro TTS: exits x=920, straight up -->
  <path d="M920,486 L920,402" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- n8n → data arrows: gap zone y=598-636, exits at x=852/860/868 (centered on n8n=860) -->

  <!-- n8n → PostgreSQL: horizontal at y=610 -->
  <path d="M852,534 L852,605 Q852,610 847,610 L495,610 Q490,610 490,615 L490,668" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- n8n → Forgejo: horizontal at y=616 -->
  <path d="M860,534 L860,611 Q860,616 855,616 L730,616 Q725,616 725,621 L725,668" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- n8n → NextCloud: horizontal at y=616 (same level as Forgejo, goes right) -->
  <path d="M868,534 L868,611 Q868,616 873,616 L940,616 Q945,616 945,621 L945,668" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- OWU → SearXNG: right from OWU center (x=420, y=514), across gap, into SearXNG upper area (y=555) -->
  <path d="M420,514 L560,514 Q565,514 565,519 L565,550 Q565,555 570,555 L690,555" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- A0 → SearXNG: straight right from A0 center (x=420, y=567) to SearXNG left (x=690, y=567) -->
  <path d="M420,567 L690,567" fill="none" stroke="#8892A0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ==================== STMNA_ BRAND WORDMARK (bottom-right) ==================== -->
  <text x="1062" y="800" style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:18px; fill:#1A1A2E">STMNA</text>
  <text x="1113" y="800" style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:18px; fill:#FF8C42">_</text>

  <!-- ==================== LEGEND (top-left, beside VPS) ==================== -->
  <g transform="translate(50, 88)">
    <text x="0" y="12" class="zone-label" fill="#6B7280" style="font-size:11px">LEGEND</text>
    <line x1="0" y1="30" x2="32" y2="30" stroke="#8892A0" stroke-width="1.2"/>
    <text x="40" y="34" class="service-desc" style="font-size:11px">Internal connection</text>
    <line x1="0" y1="48" x2="32" y2="48" stroke="#8892A0" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="40" y="52" class="service-desc" style="font-size:11px">HTTPS (secure remote)</text>
    <line x1="0" y1="66" x2="32" y2="66" stroke="#8892A0" stroke-width="1.2" stroke-dasharray="5,3" stroke-opacity="0.5"/>
    <text x="40" y="70" class="service-desc" style="font-size:11px">Tailscale VPN tunnel</text>
    <rect x="0" y="80" width="32" height="11" rx="3" fill="none" stroke="#FF8C42" stroke-width="2"/>
    <text x="40" y="90" class="service-desc" style="font-size:11px">Central hub (llama-swap)</text>
  </g>

  <!-- ==================== 12 STACKS COUNT BADGE ==================== -->
  <text x="1100" y="304" class="desk-subtitle" style="font-size:10px; fill:#8892A0" text-anchor="end">12 rootless Podman containers</text>

</svg>
