# Forgejo (Self-Hosted Git)
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# See docs/install-guide.md Step 11 for setup instructions

x-podman:
  in_pod: false

services:
  forgejo:
    # INFO: Self-hosted git forge for vault repos, workflow exports, source code
    image: codeberg.org/forgejo/forgejo:10
    container_name: forgejo
    restart: always
    ports:
      - "3300:3000"  # OPTIONAL: HTTP web UI (avoid conflict with Open WebUI on 3000)
      - "2222:22"  # OPTIONAL: SSH for git over SSH (remove if not needed)
    volumes:
      - /home/YOUR_USER/data/forgejo:/data  # REQUIRED: replace with your data path
    environment:
      - USER_UID=1000  # NO ACTION NEEDED
      - USER_GID=1000  # NO ACTION NEEDED
      - FORGEJO__server__ROOT_URL=http://YOUR_IP:3300/  # REQUIRED: replace with your server IP or domain
      - FORGEJO__database__DB_TYPE=sqlite3  # NO ACTION NEEDED
      # OPTIONAL: uncomment to disable registration after creating your admin account
      # - FORGEJO__service__DISABLE_REGISTRATION=true
    networks:
      - default
      - stmna-net

networks:
  default: {}
  stmna-net:
    external: true
