# Open WebUI
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# See docs/install-guide.md Step 6 for setup instructions

x-podman:
  in_pod: false

services:
  open-webui:
    # INFO: Chat UI for interacting with local LLMs via llama-swap
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"  # OPTIONAL: adjust to taste
    volumes:
      - /home/stmna/data/open-webui:/app/backend/data  # NO ACTION NEEDED
    environment:
      - OPENAI_API_BASE_URL=http://llama-swap:8080/v1  # REQUIRED: replace with your llama-swap endpoint
      - OPENAI_API_KEY=sk-none  # NO ACTION NEEDED
      - WEBUI_AUTH=true  # OPTIONAL: set to false for single-user mode
      - VECTOR_DB=pgvector  # NO ACTION NEEDED
      - PGVECTOR_DB_URL=postgresql://voice:YOUR_POSTGRES_PASSWORD@postgres-voice:5432/stmna_signal  # REQUIRED: replace password to match your postgres setup
    networks:
      - default
      - stmna-net

networks:
  default: {}
  stmna-net:
    external: true
