# NextCloud (Sovereign Cloud Storage)
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# See stmna-signal docs for setup instructions

# NOTE: NextCloud is used by the Signal pipeline for file drops
# (incoming content via WebDAV) and audio delivery.

x-podman:
  in_pod: false

services:
  nextcloud:
    # INFO: Sovereign cloud storage with WebDAV API for n8n file operations
    image: docker.io/library/nextcloud:30-apache
    container_name: nextcloud
    restart: always
    ports:
      - "8090:80"  # OPTIONAL: adjust to taste
    volumes:
      - /home/stmna/data/nextcloud:/var/www/html  # NO ACTION NEEDED
    environment:
      - NEXTCLOUD_ADMIN_USER=admin  # REQUIRED: replace with your admin username
      - NEXTCLOUD_ADMIN_PASSWORD=YOUR_ADMIN_PASSWORD_HERE  # REQUIRED: replace with a strong password
      - SQLITE_DATABASE=nextcloud  # NO ACTION NEEDED
      # NOTE: "nextcloud" is the container hostname, needed for n8n WebDAV access via stmna-net
      - NEXTCLOUD_TRUSTED_DOMAINS=YOUR_IP localhost nextcloud  # REQUIRED: replace YOUR_IP with your server IP
      - OVERWRITEPROTOCOL=http  # OPTIONAL: set to https if using a reverse proxy with TLS
    networks:
      - default
      - stmna-net

networks:
  default: {}
  stmna-net:
    external: true
