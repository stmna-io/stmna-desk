# Dockge (Container Management UI)
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# See docs/install-guide.md Step 3 for setup instructions

x-podman:
  in_pod: false

services:
  dockge:
    # INFO: Web UI for managing Podman compose stacks
    image: docker.io/louislam/dockge:1
    container_name: dockge
    restart: always
    ports:
      - "5001:5001"  # OPTIONAL: adjust to taste
    volumes:
      # NOTE: adjust /run/user/XXXX to match your UID (run: id -u)
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock  # REQUIRED: replace UID if not 1000
      - dockge_data:/app/data  # NO ACTION NEEDED
      - /home/stmna/stacks:/home/stmna/stacks  # REQUIRED: replace with your stacks path

    environment:
      - DOCKGE_STACKS_DIR=/home/stmna/stacks  # REQUIRED: replace with your stacks path

volumes:
  dockge_data:
    driver: local
    name: dockge_data
