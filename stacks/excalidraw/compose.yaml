# Excalidraw (Self-hosted diagram editor)
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# Shared infrastructure: available to CC, Agent Zero, n8n, and browser
# LAN-only access (not exposed via Caddy)

x-podman:
  in_pod: false

services:
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    ports:
      - "8585:80"
    networks:
      - default
      - stmna-net

networks:
  default: {}
  stmna-net:
    external: true
