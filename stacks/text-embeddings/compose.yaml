# Text Embeddings Inference (TEI)
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# See docs/install-guide.md Step 9 for setup instructions

x-podman:
  in_pod: false

services:
  text-embeddings:
    # INFO: Serves embedding vectors for vault RAG search (used by n8n, Open WebUI, Agent Zero)
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: text-embeddings
    restart: always
    ports:
      - "9003:80"  # OPTIONAL: adjust to taste
    volumes:
      - /home/stmna/data/tei:/data  # NO ACTION NEEDED
    environment:
      - MODEL_ID=perplexity-ai/pplx-embed-context-v1-0.6b  # OPTIONAL: embedding model (1024 dims, ~43ms/query on CPU)
      - DTYPE=float32  # OPTIONAL: use float16 on machines with less than 16GB RAM
      # NOTE: float32 with 16384 tokens needs ~16GB RAM for attention buffers.
      # On machines with 8GB or less, set MAX_BATCH_TOKENS to 512 or 1024.
      - MAX_BATCH_TOKENS=512  # OPTIONAL: adjust to taste (default: 16384)
      - MAX_CLIENT_BATCH_SIZE=128  # OPTIONAL: adjust to taste (default: 32)
    networks:
      - stmna-net

networks:
  stmna-net:
    external: true
