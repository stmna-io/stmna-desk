# PostgreSQL
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# See docs/install-guide.md Step 4 for setup instructions

x-podman:
  in_pod: false

services:
  postgres-voice:
    # INFO: PostgreSQL 17 for Signal pipeline queue and content cache
    image: docker.io/postgres:17
    container_name: postgres-voice
    restart: always
    ports:
      - "5432:5432"  # OPTIONAL: adjust to taste
    environment:
      POSTGRES_DB: stmna_voice  # REQUIRED: replace with your database name
      POSTGRES_USER: voice  # REQUIRED: replace with your database username
      POSTGRES_PASSWORD: YOUR_POSTGRES_PASSWORD  # REQUIRED: replace with a strong password
    volumes:
      - /home/stmna/data/postgres:/var/lib/postgresql/data  # NO ACTION NEEDED
    networks:
      - default
      - stmna-net

networks:
  default: {}
  stmna-net:
    external: true
