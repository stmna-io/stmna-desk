# Agent Zero (AI Agent)
# Part of STMNA Desk — https://github.com/stmna-io/stmna-desk
# See docs/install-guide.md Step 12 for setup instructions

x-podman:
  in_pod: false

services:
  agent-zero:
    # INFO: Autonomous AI agent with memory, tools, and code execution
    image: docker.io/agent0ai/agent-zero:latest
    container_name: agent-zero
    restart: always
    ports:
      - "50001:80"  # OPTIONAL: adjust to taste
    volumes:
      - ./usr:/a0/usr  # NO ACTION NEEDED
      - ./agents:/a0/agents  # NO ACTION NEEDED
      - ./work_dir:/a0/work_dir  # NO ACTION NEEDED
      - ./knowledge:/a0/knowledge  # NO ACTION NEEDED
      - ./logs:/a0/logs  # NO ACTION NEEDED
    environment:
      # Chat model (must match a model in your llama-swap config)
      - A0_SET_chat_model_provider=openai  # REQUIRED: replace with your model provider
      - A0_SET_chat_model_name=qwen3.5-35b-nothink  # REQUIRED: replace with your model name
      - A0_SET_chat_model_api_base=http://llama-swap:8080/v1  # REQUIRED: replace with your LLM endpoint
      - A0_SET_chat_model_ctx_length=65536  # REQUIRED: must match llama-swap -c value
      # Utility model
      - A0_SET_util_model_provider=openai  # REQUIRED: replace with your model provider
      - A0_SET_util_model_name=qwen3.5-35b-nothink  # REQUIRED: replace with your model name
      - A0_SET_util_model_api_base=http://llama-swap:8080/v1  # REQUIRED: replace with your LLM endpoint
      - A0_SET_util_model_ctx_length=65536  # REQUIRED: must match llama-swap -c value
      # OPTIONAL: configure an embedding provider if you want Agent Zero to use RAG
      # - A0_SET_embed_model_provider=openai
      # - A0_SET_embed_model_name=your-embedding-model
      # - A0_SET_embed_model_api_base=http://your-embedding-service/v1
      # Browser/vision model
      - A0_SET_browser_model_provider=openai  # REQUIRED: replace with your model provider
      - A0_SET_browser_model_name=qwen3.5-35b-nothink  # REQUIRED: replace with your model name
      - A0_SET_browser_model_api_base=http://llama-swap:8080/v1  # REQUIRED: replace with your LLM endpoint
      - A0_SET_browser_model_ctx_length=65536  # REQUIRED: must match llama-swap -c value
      - API_KEY_OPENAI=sk-not-needed  # NO ACTION NEEDED
    networks:
      - stmna-net

networks:
  stmna-net:
    external: true
